syntax = "proto3";

package google.rpc;

import "google/protobuf/struct.proto";

message Status {
  int32 code = 1;
  string message = 2;
  repeated .google.protobuf.Any details = 3;
}

// ═══ 跨包引用类型（复制以避免循环导入）═══

// Copied from: google.protobuf.Any
message Any {
  string type_url = 1;
  bytes value = 2;
}
