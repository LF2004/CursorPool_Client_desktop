// [FIX #2] 从源 proto (proto/aiserver_v1.proto:1174-1256) 完整还原 AvailableModelsResponse
// 之前用 ModelDetails 作为占位是错误的 — 字段完全不同，导致编解码错位
message AvailableModelsResponse {
  // 嵌套: AvailableModel — UI 主要读 models[] 数组里的每个元素
  message AvailableModel {
    string name = 1;                                              // 模型标识名
    bool default_on = 2;                                          // 是否默认选中
    optional bool is_long_context_only = 3;                      // 仅长上下文
    optional bool is_chat_only = 4;                              // 仅聊天
    optional bool supports_agent = 5;                            // ← 关键！支持 Agent 模式
    optional DegradationStatus degradation_status = 6;           // 降级状态
    optional double price = 7;                                    // 价格
    optional TooltipData tooltip_data = 8;                        // 工具提示(普通)
    optional TooltipData tooltip_data_for_max_mode = 20;         // 工具提示(Max模式)
    optional bool supports_thinking = 9;                          // 支持思考模式
    optional bool supports_images = 10;                           // 支持图片输入
    optional bool supports_auto_context = 11;                     // 自动上下文
    optional int32 auto_context_max_tokens = 12;
    optional int32 auto_context_extended_max_tokens = 13;
    optional bool supports_max_mode = 14;                         // ← 关键！支持 Max 模式
    optional bool supports_non_max_mode = 19;
    optional int32 context_token_limit = 15;
    optional int32 context_token_limit_for_max_mode = 16;
    optional string client_display_name = 17;                     // ← UI 显示名称
    optional string server_model_name = 18;                       // ← 服务端模型名
    optional bool is_recommended_for_background_composer = 21;
    optional bool supports_plan_mode = 22;                        // 支持 Plan 模式
    optional bool supports_sandboxing = 25;
    optional bool is_user_added = 23;
    optional string inputbox_short_model_name = 24;               // 输入框简短显示名
    optional bool supports_cmd_k = 26;
    optional bool only_supports_cmd_k = 27;
    optional int32 background_composer_sort_order = 28;
    repeated ModelParameterDefinition parameter_definitions = 29;
    repeated ModelVariantConfig variants = 30;
  }

  enum DegradationStatus {
    DEGRADATION_STATUS_UNSPECIFIED = 0;
    DEGRADATION_STATUS_DEGRADED = 1;
    DEGRADATION_STATUS_DISABLED = 2;
  }

  message FeatureModelConfig {
    string default_model = 1;
    repeated string fallback_models = 2;
    repeated string best_of_n_default_models = 3;
  }

  message ModelVariantConfig {
    repeated RequestedModel.ModelParameterValue parameter_values = 1;
    string display_name = 2;
    bool is_max_mode = 3;
    optional bool is_default_non_max_config = 4;
    optional TooltipData tooltip_data = 6;
    string tagline = 7;
  }

  message TooltipData {
    string primary_text = 1;
    string secondary_text = 2;
    bool secondary_warning_text = 3;
