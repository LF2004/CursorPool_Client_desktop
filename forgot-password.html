<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>找回密码 - 小帆CursorPool</title>
  <link rel="stylesheet" href="./css/tailwind.min.css" />
  <link rel="stylesheet" href="./css/font-awesome.min.css" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .forgot-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .forgot-card {
      width: 460px;
      max-width: 100%;
      border: 1px solid #273449;
      border-radius: 16px;
      padding: 28px 24px;
      background: linear-gradient(160deg, rgba(11, 20, 38, 0.86), rgba(15, 23, 42, 0.7));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .forgot-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .forgot-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(var(--accent-rgb), 0.18);
      color: rgba(var(--accent-rgb), 1);
      font-size: 24px;
      border: 1px solid rgba(var(--accent-rgb), 0.35);
    }
    .forgot-title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
    }
    .forgot-desc {
      margin: 8px 0 0;
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.6;
    }
    .forgot-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 18px 0 22px;
    }
    .step-chip {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255, 255, 255, 0.03);
      font-size: 12px;
      color: #cbd5e1;
      text-align: center;
    }
    .forgot-form {
      display: grid;
      gap: 14px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #cbd5e1;
    }
    .form-hint {
      margin-top: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    .code-row {
      display: grid;
      grid-template-columns: 1fr 122px;
      gap: 10px;
      align-items: center;
    }
    .code-btn {
      height: 44px;
      white-space: nowrap;
    }
    .forgot-actions {
      display: grid;
      gap: 12px;
      margin-top: 6px;
    }
    .forgot-note {
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(var(--accent-rgb), 0.08);
      border: 1px solid rgba(var(--accent-rgb), 0.2);
      font-size: 12px;
      color: #cbd5e1;
      line-height: 1.6;
    }
    .back-login {
      text-align: center;
      font-size: 13px;
      color: #9ca3af;
    }
    .back-login a {
      color: rgba(var(--accent-rgb), 1);
      text-decoration: none;
    }
    .back-login a:hover {
      text-decoration: underline;
    }
    @media (max-width: 520px) {
      .forgot-card {
        padding: 24px 18px;
      }
      .forgot-title {
        font-size: 26px;
      }
      .forgot-steps,
      .code-row {
        grid-template-columns: 1fr;
      }
      .code-btn {
        width: 100%;
      }
    }
    body.theme-light .forgot-card {
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.92));
      border-color: rgba(0, 0, 0, 0.1);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }
    body.theme-light .form-label {
      color: #334155;
    }
    body.theme-light .forgot-desc,
    body.theme-light .back-login,
    body.theme-light .form-hint {
      color: #64748b;
    }
    body.theme-light .step-chip,
    body.theme-light .forgot-note {
      color: #334155;
      background: rgba(15, 23, 42, 0.03);
    }
  </style>
</head>
<body class="theme-dark glass-off no-wallpaper">
  <div class="forgot-shell">
    <section class="forgot-card">
      <div class="forgot-header">
        <div class="forgot-logo">
          <i class="fa fa-unlock-alt"></i>
        </div>
        <h1 class="forgot-title">找回密码</h1>
        <p class="forgot-desc">请输入注册邮箱并完成验证码验证，我们将协助你安全重置账户密码。</p>
      </div>

      <div class="forgot-steps">
        <div class="step-chip">1. 验证邮箱</div>
        <div class="step-chip">2. 输入验证码</div>
        <div class="step-chip">3. 重置密码</div>
      </div>

      <form class="forgot-form">
        <div>
          <label class="form-label" for="email">邮箱地址</label>
          <input id="email" class="input" type="email" placeholder="请输入注册邮箱" />
          <div class="form-hint">请填写你注册账号时使用的邮箱地址</div>
        </div>

        <div>
          <label class="form-label" for="code">验证码</label>
          <div class="code-row">
            <input id="code" class="input" type="text" placeholder="请输入邮箱验证码" />
            <button type="button" class="ghost-btn code-btn">获取验证码</button>
          </div>
        </div>

        <div>
          <label class="form-label" for="password">新密码</label>
          <input id="password" class="input" type="password" placeholder="请输入新密码" />
        </div>

        <div>
          <label class="form-label" for="confirmPassword">确认新密码</label>
          <input id="confirmPassword" class="input" type="password" placeholder="请再次输入新密码" />
        </div>

        <div class="forgot-note">
          为保障账号安全，建议使用 8 位以上并包含字母与数字的密码组合。
        </div>

        <div class="forgot-actions">
          <button type="submit" class="primary-btn">立即重置密码</button>
          <div class="back-login">
            想起密码了？<a href="./index.html">返回登录</a>
          </div>
        </div>
      </form>
    </section>
  </div>
</body>
</html>
